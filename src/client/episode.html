<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="base.css" />
    <link rel="stylesheet" type="text/css" href="episode-panel.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>devvit</title>
  </head>
  <body class="app">
    <main class="card">
      <div class="episode-image-wrap hidden" id="episode-image-wrap">
        <button class="episode-image-btn" id="episode-image-btn" type="button" aria-label="Play episode">
          <img class="episode-image" id="episode-image" alt="" />
          <span class="play-icon" aria-hidden="true">&#9654;</span>
        </button>
      </div>

      <div class="description-wrap">
        <p class="description clamped" id="episode-description"></p>
        <button class="read-more hidden" id="read-more" type="button">Read more</button>
      </div>

      <p class="episode-meta" id="episode-meta"></p>

      <div class="service-switch" id="service-switch"></div>

      <div class="player-wrap hidden" id="player-wrap">
        <iframe
          id="episode-player"
          class="episode-player"
          title="Episode player"
          loading="lazy"
          allow="autoplay; encrypted-media; picture-in-picture"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
        <p class="player-note" id="player-note"></p>
      </div>

      <div class="service-links" id="service-links"></div>
    </main>
    <script type="module" src="episode.js" defer></script>
  </body>
</html>
