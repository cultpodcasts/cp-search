<section class="panel" aria-label="Episode details">
  <h2 class="episode-title" id="episode-title">Episode</h2>
  <p class="episode-meta" id="episode-meta"></p>
  <p class="description" id="episode-description"></p>

  <div class="service-switch" id="service-switch"></div>

  <div class="player-wrap" id="player-wrap">
    <iframe
      id="episode-player"
      class="episode-player"
      title="Episode player"
      loading="lazy"
      allow="autoplay; encrypted-media; picture-in-picture"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <p class="player-note" id="player-note"></p>
  </div>

  <div class="service-links" id="service-links"></div>
</section>
